<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav id="navbar">
        <h2>My Portfolio</h2>

        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#gallery">Gallery</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>

        <button id="darkModeBtn">🌙</button>
    </nav>

    <section id="home">
        <h1>Welcome to My Portfolio</h1>
        <p>I am a Full Stack Developer trainee.</p>
    </section>

    <section id="about">
        <h2>About Me</h2>
        <p>
            Passionate about building web applications with
            HTML, CSS, JavaScript and modern technologies.
        </p>
    </section>

    <section id="projects">
        <h2>Projects</h2>
        <ul id="project-list"></ul>
    </section>

    <section id="gallery">
        <h2>Image Gallery</h2>

        <div class="gallery-container">
            <img src="https://picsum.photos/300?1">
            <img src="https://picsum.photos/300?2">
            <img src="https://picsum.photos/300?3">
            <img src="https://picsum.photos/300?4">
        </div>
    </section>

    <section id="contact">
        <h2>Contact Me</h2>

        <form id="contactForm">

            <input
                type="text"
                id="name"
                placeholder="Your Name"
            >

            <input
                type="email"
                id="email"
                placeholder="Your Email"
            >

            <input
                type="text"
                id="phone"
                placeholder="Phone Number"
            >

            <textarea
                id="message"
                placeholder="Your Message"
            ></textarea>

            <button type="submit">Send</button>

        </form>

        <p id="formMessage"></p>
    </section>

    <script src="script.js"></script>

</body>
</html>
