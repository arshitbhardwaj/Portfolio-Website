<!DOCTYPE html>
<html>

<head>

    <title>Character Counter</title>

</head>

<body>

    <h1>Character Counter</h1>

    <textarea id="textBox"
              rows="5"
              cols="30"
              onkeyup="countChars()"></textarea>

    <p>
        Characters:
        <span id="count">0</span>/280
    </p>

    <script src="script.js"></script>

</body>
</html>
