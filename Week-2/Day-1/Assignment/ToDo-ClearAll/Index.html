<!DOCTYPE html>
<html>

<head>

    <title>To-Do List</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>To-Do List</h1>

        <input id="taskInput"
               type="text"
               placeholder="New Task">

        <button id="addBtn">
            Add Task
        </button>

        <button onclick="clearAll()">
            Clear All
        </button>

        <ul id="taskList"></ul>

    </div>

    <script src="script.js"></script>

</body>
</html>
