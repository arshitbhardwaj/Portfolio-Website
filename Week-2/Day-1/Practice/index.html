<!DOCTYPE html>
<html>
<head>
    <title>Week 2 Day 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>JavaScript DOM Practice</h1>
    <p id="para">

    </p>

       onkeyup="showText()"

<h2 id="output"></h2>
    <script src="script.js"></script>
</body>
</html>
